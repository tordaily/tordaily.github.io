<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold-light: #f5e4b0;
  --gold-dim: #b8963e;
  --bg: #080810;
  --text-main: #f0e8d5;
  --text-muted: #b8a98a;
  --tor-base: #0c1f14;
  --tor-glow: #1a5c3a;
  --tor-accent: #6aab7a;
  --van-base: #1e1503;
  --van-glow: #7a4d00;
  --van-accent: #e8aa3a;
}

html, body { height: 100%; background: var(--bg); color: var(--text-main); font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }

#starfield { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

/* Back button */
.back-btn {
  position: fixed;
  top: 1.25rem;
  left: 1.25rem;
  z-index: 100;
  font-family: 'Raleway', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 0.5rem 1rem;
  border-radius: 20px;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.back-btn:hover { background: rgba(255,255,255,0.1); }
.back-btn.visible { opacity: 1; pointer-events: all; }

.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem 4rem;
  gap: 1.5rem;
}

.date-label {
  font-family: 'Raleway', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-muted);
  opacity: 0.7;
}

/* Cards wrapper */
.cards-wrapper {
  display: flex;
  flex-direction: row;
  gap: 1.5rem;
  width: 100%;
  max-width: 1060px;
  justify-content: center;
  align-items: flex-start;
}

/* Base card */
.card {
  position: relative;
  border-radius: 24px;
  padding: clamp(2rem, 5vw, 3.5rem) clamp(1.2rem, 4vw, 2.5rem);
  flex: 1;
  min-width: 0;
  max-width: 500px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.4s cubic-bezier(.22,.68,0,1.2),
              box-shadow 0.4s ease,
              opacity 0.4s ease,
              flex 0.4s ease,
              max-width 0.4s ease;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 24px;
  padding: 1.5px;
  background: var(--card-border);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.card-deco {
  position: absolute;
  top: -10px;
  right: -10px;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  opacity: 0.1;
  pointer-events: none;
}

/* Tor card */
.card-tor {
  background: radial-gradient(ellipse at 35% 25%, var(--tor-glow) 0%, var(--tor-base) 55%, #060f09 100%);
  box-shadow: 0 8px 48px rgba(26,92,58,0.55), 0 0 0 1px rgba(106,171,122,0.18);
  --card-border: linear-gradient(135deg, var(--tor-accent), transparent 50%, var(--gold-dim));
}
.card-tor .card-deco { background: radial-gradient(circle, var(--tor-accent), transparent 70%); }
.card-tor:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 16px 64px rgba(26,92,58,0.75), 0 0 60px rgba(106,171,122,0.2); }
.card-tor .card-name { color: #a8d4a8; }
.card-tor .twin-intel { background: rgba(106,171,122,0.1); border-color: rgba(106,171,122,0.22); color: #a8d4a8; }
.card-tor .twin-intel.show { display: block !important; animation: pulseIn 0.5s cubic-bezier(.22,.68,0,1.3) both; }
.card-tor .fortune { background: rgba(232,201,122,0.07); border-color: rgba(232,201,122,0.18); }

/* Vanessa card */
.card-van {
  background: radial-gradient(ellipse at 65% 25%, var(--van-glow) 0%, var(--van-base) 55%, #0a0700 100%);
  box-shadow: 0 8px 48px rgba(122,77,0,0.6), 0 0 0 1px rgba(232,170,58,0.2);
  --card-border: linear-gradient(135deg, var(--van-accent), transparent 50%, #c8861a);
}
.card-van .card-deco { background: radial-gradient(circle, var(--van-accent), transparent 70%); }
.card-van:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 16px 64px rgba(122,77,0,0.75), 0 0 60px rgba(232,170,58,0.2); }
.card-van .card-name { color: #f5d878; }
.card-van .twin-intel { background: rgba(232,170,58,0.08); border-color: rgba(232,170,58,0.2); color: #f5d878; }
.card-van .twin-intel.show { display: block !important; animation: pulseIn 0.5s cubic-bezier(.22,.68,0,1.3) both; }
.card-van .fortune { background: rgba(232,170,58,0.07); border-color: rgba(232,170,58,0.18); }

.card:active { transform: scale(0.98); }

/* Active / inactive state */
.cards-wrapper.tor-active .card-van,
.cards-wrapper.van-active .card-tor {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.92);
  flex: 0;
  min-width: 0;
  max-width: 0;
  padding-left: 0;
  padding-right: 0;
  overflow: hidden;
}
.cards-wrapper.tor-active .card-tor,
.cards-wrapper.van-active .card-van {
  max-width: 520px;
  cursor: default;
}
.cards-wrapper.tor-active,
.cards-wrapper.van-active {
  justify-content: center;
}

/* Card internals */
.card-name {
  font-family: 'Josefin Sans', sans-serif;
  font-size: clamp(1.8rem, 6vw, 3rem);
  font-weight: 100;
  letter-spacing: clamp(0.1em, 2vw, 0.35em);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 0.75rem;
}

.card-tagline {
  font-family: 'Raleway', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
  overflow: hidden;
  transition: opacity 0.35s ease, max-height 0.35s ease;
  max-height: 2rem;
}

.horoscope-area {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease, margin-top 0.4s ease;
  margin-top: 0;
}
.horoscope-area.visible { max-height: 2200px; opacity: 1; margin-top: 1.75rem; }

.horoscope-inner { padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.07); }

.horoscope-text { font-size: 1.1rem; line-height: 1.9; color: var(--text-main); font-weight: 300; text-align: center; }

.fortune { margin-top: 1.4rem; padding: 0.9rem 1.1rem; border-radius: 10px; text-align: center; }
.fortune-label { font-family: 'Raleway', sans-serif; font-size: 0.58rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold-dim); display: block; margin-bottom: 0.35rem; opacity: 0.8; }
.fortune-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--gold-light); line-height: 1.6; opacity: 0.85; }

.twin-intel { display: none; margin-top: 1.5rem; padding: 1rem 1.2rem; border-radius: 12px; font-size: 0.95rem; font-style: italic; line-height: 1.7; text-align: center; border: 1px solid; }
@keyframes pulseIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.twin-label { font-family: 'Raleway', sans-serif; font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.65; display: block; margin-bottom: 0.4rem; }

.comic-label-wrap { margin-top: 1.5rem; text-align: center; }
.comic-label { font-family: 'Raleway', sans-serif; font-size: 0.58rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold-dim); display: block; margin-bottom: 0.5rem; opacity: 0.8; }
#comic-embed-tor, #comic-embed-van { border-radius: 16px; overflow: hidden; }
#comic-embed-tor iframe, #comic-embed-van iframe { border-radius: 16px !important; display: block; }

.sparkle { position: fixed; pointer-events: none; z-index: 999; border-radius: 50%; animation: sparkleAnim 0.8s ease-out forwards; }
@keyframes sparkleAnim { 0% { opacity:1; transform:scale(1) translate(0,0); } 100% { opacity:0; transform:scale(0) translate(var(--dx),var(--dy)); } }

@media (max-width: 640px) {
  .cards-wrapper { flex-direction: column; align-items: center; }
  .card { max-width: 100%; flex: none; width: 100%; }
  .cards-wrapper.tor-active .card-van,
  .cards-wrapper.van-active .card-tor {
    max-width: 0;
    padding-top: 0;
    padding-bottom: 0;
    overflow: hidden;
  }
}
</style>
</head>

function getAustinDateParts() {
  const parts = new Intl.DateTimeFormat('en-US', { timeZone: 'America/Chicago', year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(new Date());
  return { year: parseInt(parts.find(p=>p.type==='year').value), month: parseInt(parts.find(p=>p.type==='month').value), day: parseInt(parts.find(p=>p.type==='day').value) };
}
function getDayOfYear(y,m,d) { return Math.round((new Date(y,m-1,d)-new Date(y,0,1))/86400000); }
document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US',{timeZone:'America/Chicago',month:'long',day:'numeric',year:'numeric'});

// Seeded RNG
function makeRng(seed) {
  let s = seed >>> 0;
  return function() { s=Math.imul(s^(s>>>16),0x45d9f3b); s=Math.imul(s^(s>>>16),0x45d9f3b); s^=(s>>>16); return (s>>>0)/0x100000000; };
}
function seededShuffle(n, seed) {
  const arr = Array.from({length:n},(_,i)=>i), rng = makeRng(seed);
  for (let i=n-1;i>0;i--) { const j=Math.floor(rng()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function getWeeklyComic(offset) {
  const anchor = new Date('2026-04-18T00:00:00-05:00');
  const weeksPassed = Math.floor((new Date() - anchor) / (7 * 24 * 60 * 60 * 1000));
  const idx = (((weeksPassed + offset) % COMICS.length) + COMICS.length) % COMICS.length;
  return COMICS[idx];
}
// Vanessa starts at week 0, Tor starts offset by 25 (halfway through)
function getVanComic() { return getWeeklyComic(0); }
function getTorComic() { return getWeeklyComic(25); }

// Compute daily content
const { year, month, day } = getAustinDateParts();
const doy = getDayOfYear(year, month, day);

// Tor daily
const torNA = torPartA.length, torNB = torPartB.length, torNC = torPartC.length;
const torShuffle  = seededShuffle(torNA*torNB*torNC, year * 31337);
const torIS       = seededShuffle(torIntel.length, year * 99991);
const torFS       = seededShuffle(torFortunes.length, year * 77777 + 42);
const torCombo    = torShuffle[doy % torShuffle.length];
const torHoro     = torPartA[torCombo % torNA] + ' ' + torPartB[Math.floor(torCombo/torNA) % torNB] + ' ' + torPartC[Math.floor(torCombo/(torNA*torNB)) % torNC];
const torFortune  = torFortunes[torFS[doy % torFS.length]];
const torDailyInt = torIntel[torIS[doy % torIS.length]];

// Vanessa daily
const vanNA = vanPartA.length, vanNB = vanPartB.length, vanNC = vanPartC.length;
const vanShuffle  = seededShuffle(vanNA*vanNB*vanNC, year * 51413);
const vanIS       = seededShuffle(vanIntel.length, year * 88883);
const vanFS       = seededShuffle(vanFortunes.length, year * 63331 + 17);
const vanCombo    = vanShuffle[doy % vanShuffle.length];
const vanHoro     = vanPartA[vanCombo % vanNA] + ' ' + vanPartB[Math.floor(vanCombo/vanNA) % vanNB] + ' ' + vanPartC[Math.floor(vanCombo/(vanNA*vanNB)) % vanNC];
const vanFortune  = vanFortunes[vanFS[doy % vanFS.length]];
const vanDailyInt = vanIntel[vanIS[doy % vanIS.length]];

// State
let activeCard = null;
let intelTimer = null;

function openCard(who, cardEl, event) {
  if (event) event.stopPropagation();
  if (activeCard === who) return;
  activeCard = who;

  const wrapper = document.getElementById('cards-wrapper');
  wrapper.classList.add(who === 'tor' ? 'tor-active' : 'van-active');
  document.getElementById('back-btn').classList.add('visible');

  if (who === 'tor') {
    document.getElementById('horo-tor-text').textContent = torHoro;
    document.getElementById('fortune-tor-text').textContent = torFortune;
    document.getElementById('intel-tor-text').textContent = torDailyInt;
    const area = document.getElementById('horo-tor');
    const intel = document.getElementById('intel-tor');
    intel.classList.remove('show');
    area.classList.add('visible');
    document.getElementById('tagline-tor').style.opacity = '0';
    document.getElementById('tagline-tor').style.maxHeight = '0';
    intelTimer = setTimeout(() => intel.classList.add('show'), 400);
    const cc = document.getElementById('comic-embed-tor');
    if (!cc.hasChildNodes()) { cc.innerHTML = getTorComic(); if (window.instgrm) window.instgrm.Embeds.process(); }
    spawnSparkles(cardEl, 'tor');
  } else {
    document.getElementById('horo-van-text').textContent = vanHoro;
    document.getElementById('fortune-van-text').textContent = vanFortune;
    document.getElementById('intel-van-text').textContent = vanDailyInt;
    const area = document.getElementById('horo-van');
    const intel = document.getElementById('intel-van');
    intel.classList.remove('show');
    area.classList.add('visible');
    document.getElementById('tagline-van').style.opacity = '0';
    document.getElementById('tagline-van').style.maxHeight = '0';
    intelTimer = setTimeout(() => intel.classList.add('show'), 400);
    const cc = document.getElementById('comic-embed-van');
    if (!cc.hasChildNodes()) { cc.innerHTML = getVanComic(); if (window.instgrm) window.instgrm.Embeds.process(); }
    spawnSparkles(cardEl, 'van');
  }
}

function goBack() {
  if (!activeCard) return;
  if (intelTimer) { clearTimeout(intelTimer); intelTimer = null; }
  const wrapper = document.getElementById('cards-wrapper');
  wrapper.classList.remove('tor-active', 'van-active');
  document.getElementById('back-btn').classList.remove('visible');

  if (activeCard === 'tor') {
    document.getElementById('horo-tor').classList.remove('visible');
    document.getElementById('intel-tor').classList.remove('show');
    document.getElementById('tagline-tor').style.opacity = '1';
    document.getElementById('tagline-tor').style.maxHeight = '2rem';
  } else {
    document.getElementById('horo-van').classList.remove('visible');
    document.getElementById('intel-van').classList.remove('show');
    document.getElementById('tagline-van').style.opacity = '1';
    document.getElementById('tagline-van').style.maxHeight = '2rem';
  }
  activeCard = null;
}

function spawnSparkles(el, who) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
  const colors = who === 'tor'
    ? ['#a8d4a8','#e8c97a','#6aab7a','#c8e8c0']
    : ['#f5d878','#e8aa3a','#fdf0c0','#f0c060'];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = 4 + Math.random() * 7, angle = Math.random() * Math.PI * 2, dist = 50 + Math.random() * 100;
    s.style.cssText = `left:${cx-size/2}px;top:${cy-size/2}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;animation-duration:${0.5+Math.random()*0.5}s;`;
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

// Starfield
(function() {
  const canvas = document.getElementById('starfield'), ctx = canvas.getContext('2d');
  let stars = [], W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = Math.max(window.innerHeight, document.body.scrollHeight); }
  function initStars() {
    stars = [];
    for (let i = 0; i < Math.floor((W*H)/4800); i++)
      stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5,alpha:0.2+Math.random()*0.7,speed:0.003+Math.random()*0.008,phase:Math.random()*Math.PI*2});
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,W,H); frame++;
    for (const s of stars) {
      const a = s.alpha*(0.6+0.4*Math.sin(s.phase+frame*s.speed));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(245,228,176,${a})`; ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();initStars();});
  resize(); initStars(); draw();
})();
</script>
